[project]
name = "trello-mcp"
version = "0.1.0"
description = "MCP server for Trello（カンバン型プロジェクト管理）"
requires-python = ">=3.10"
dependencies = [
    "mcp>=1.0.0",
    "httpx>=0.27.0",
]

[project.scripts]
trello-mcp = "trello_mcp.server:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/trello_mcp"]
