[project]
name = "calendly-mcp"
version = "0.1.0"
description = "MCP server for Calendly（スケジュール調整・予約管理）"
requires-python = ">=3.10"
dependencies = [
    "mcp>=1.0.0",
    "httpx>=0.27.0",
]

[project.scripts]
calendly-mcp = "calendly_mcp.server:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/calendly_mcp"]
