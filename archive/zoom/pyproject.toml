[project]
name = "zoom-mcp"
version = "0.1.0"
description = "MCP server for Zoom（ビデオ会議・ウェビナー管理）"
requires-python = ">=3.10"
dependencies = [
    "mcp>=1.0.0",
    "httpx>=0.27.0",
]

[project.scripts]
zoom-mcp = "zoom_mcp.server:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/zoom_mcp"]
