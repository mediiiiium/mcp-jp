[project]
name = "zendesk-mcp"
version = "0.1.0"
description = "MCP server for Zendesk（カスタマーサポート）"
requires-python = ">=3.10"
dependencies = [
    "mcp>=1.0.0",
    "httpx>=0.27.0",
]

[project.scripts]
zendesk-mcp = "zendesk_mcp.server:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/zendesk_mcp"]
