[project]
name = "mailchimp-mcp"
version = "0.1.0"
description = "MCP server for Mailchimp（メールマーケティング）"
requires-python = ">=3.10"
dependencies = [
    "mcp>=1.0.0",
    "httpx>=0.27.0",
]

[project.scripts]
mailchimp-mcp = "mailchimp_mcp.server:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/mailchimp_mcp"]
