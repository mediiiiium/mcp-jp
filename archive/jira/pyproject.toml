[project]
name = "jira-mcp"
version = "0.1.0"
description = "MCP server for Jira（プロジェクト管理・課題追跡）"
requires-python = ">=3.10"
dependencies = [
    "mcp>=1.0.0",
    "httpx>=0.27.0",
]

[project.scripts]
jira-mcp = "jira_mcp.server:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/jira_mcp"]
