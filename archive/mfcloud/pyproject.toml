[project]
name = "mfcloud-mcp"
version = "0.1.0"
description = "MCP server for マネーフォワードクラウド請求書 API"
requires-python = ">=3.10"
dependencies = [
    "mcp>=1.0.0",
    "httpx>=0.27.0",
]

[project.scripts]
mfcloud-mcp = "mfcloud_mcp.server:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
sources = {"src" = "mfcloud_mcp"}
