[project]
name = "yappli-crm-mcp"
version = "0.1.0"
description = "MCP server for Yappli CRM（モバイルアプリ向けノーコードCRM）"
requires-python = ">=3.10"
dependencies = [
    "mcp>=1.0.0",
    "httpx>=0.27.0",
]

[project.scripts]
yappli-crm-mcp = "yappli_crm_mcp.server:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/yappli_crm_mcp"]
