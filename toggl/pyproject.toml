[project]
name = "toggl-mcp"
version = "0.1.0"
description = "MCP server for Toggl Track（時間計測・工数管理）"
requires-python = ">=3.10"
dependencies = [
    "mcp>=1.0.0",
    "httpx>=0.27.0",
]

[project.scripts]
toggl-mcp = "toggl_mcp.server:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/toggl_mcp"]
