name: コネクタリクエストに自動返信

on:
  issues:
    types: [opened, labeled]

permissions:
  issues: write

jobs:
  ack:
    runs-on: ubuntu-latest
    # connector-request ラベルが付いた Issue だけを対象にする
    if: contains(join(github.event.issue.labels.*.name, ','), 'connector-request')
    steps:
      - name: 重複返信を防ぐ
        id: guard
        uses: actions/github-script@v7
        with:
          script: |
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const already = comments.some(c =>
              c.user.type === 'Bot' && c.body.includes('<!-- connector-request-ack -->')
            );
            core.setOutput('already', already ? 'yes' : 'no');

      - name: お礼コメントを投稿
        if: steps.guard.outputs.already == 'no'
        uses: actions/github-script@v7
        with:
          script: |
            const body = [
              '<!-- connector-request-ack -->',
              'リクエストありがとうございます！ 🙌',
              '',
              'いただいた内容は**需要として記録**し、[候補選定マトリクス](https://github.com/mediiiiium/mcp-jp/blob/main/docs/connector-candidates.md)（公式 MCP 不在の持続性・需要・検証可能性・日本 SMB 密着度）で検討します。**リクエストが重なっているものから優先して実装**していきます。',
              '',
              'いくつか正直にお伝えしておくと：',
              '- すべてをすぐに作れるわけではありませんが、ひとつずつ着実に進めます。',
              '- もし**公式 MCP が既にあるサービス**だった場合は、そちらの利用をおすすめする形でクローズすることがあります（[公式 MCP 一覧](https://github.com/mediiiiium/mcp-jp#公式mcpが提供されているサービス)）。',
              '- 「どんな作業を AI に任せたいか」を具体的に書いていただけると、実装の優先度が上がります。',
              '',
              '進捗はこの Issue でお知らせします。引き続きどうぞよろしくお願いします！',
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
