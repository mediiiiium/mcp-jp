name: Monthly MCP Candidate Full Scan

on:
  schedule:
    - cron: '0 0 1 * *'  # 毎月1日 9:00 JST (UTC 0:00)
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install httpx beautifulsoup4

      - name: Run full scan
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/discover_candidates.py --token "$GITHUB_TOKEN"

      - name: Ensure candidate label exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh label create candidate --description "MCP開発候補（discover_candidates.py が検出）" --color "1D76DB" --force

      - name: Create one Issue per newly-surfaced Tier1 candidate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COUNT=$(jq 'length' notes/new_tier1_candidates.json)
          echo "新規Tier1候補: ${COUNT}件"
          for i in $(seq 0 $((COUNT - 1))); do
            NAME=$(jq -r ".[$i].name" notes/new_tier1_candidates.json)
            CATEGORY=$(jq -r ".[$i].category" notes/new_tier1_candidates.json)
            DOMAIN=$(jq -r ".[$i].domain" notes/new_tier1_candidates.json)
            LINK=$(jq -r ".[$i].proni_url" notes/new_tier1_candidates.json)
            API_URL=$(jq -r ".[$i].signals.api_url" notes/new_tier1_candidates.json)
            EVIDENCE=$(jq -r ".[$i].signals.api_evidence | join(\" / \")" notes/new_tier1_candidates.json)

            BODY=$(printf '%s\n' \
              "新規に Tier1（即着手候補）入りしたサービスです。discover_candidates.py の自動巡回で検出されました。" \
              "" \
              "- サービス名: ${NAME}" \
              "- カテゴリ: ${CATEGORY}" \
              "- ドメイン: ${DOMAIN}" \
              "- API判定の根拠: ${EVIDENCE}" \
              "- API URL: ${API_URL}" \
              "- 出典（PRONIアイミツ）: ${LINK}" \
              "" \
              "## 着手前に必ずやること（docs/connector-candidates.md 参照）" \
              "" \
              "- [ ] 公式MCP・公式連携の有無を Web で裏取り（ベンダー発表・GitHub・mcp.<service>.com）" \
              "- [ ] API ドキュメントの実在と認証方式を確認" \
              "- [ ] テスト用クレデンシャルの取得可否を確認（アカウント登録が必要な場合あり）" \
              "- [ ] docs/connector-candidates.md の A/B/C/D 軸でスコアリングし、9点以上か確認" \
              "- [ ] リポジトリ直下・archive/ に同種コネクタが無いか重複チェック" \
              "" \
              "上記が揃ったら着手可否を判断してください。")

            gh issue create \
              --title "MCP候補: 新規Tier1 — ${NAME}" \
              --label "candidate" \
              --body "$BODY"
          done

      - name: Commit updated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add notes/candidates_state.json
          git diff --cached --quiet || git commit -m "chore(discover): 月次フルスキャンで state 更新 $(date +%Y-%m-%d)"
          git push
