[project]
name = "smarthr-mcp"
version = "0.1.0"
description = "MCP server for SmartHR 人事・労務管理"
requires-python = ">=3.10"
dependencies = [
    "mcp>=1.0.0",
    "httpx>=0.27.0",
]

[project.scripts]
smarthr-mcp = "smarthr_mcp.server:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/smarthr_mcp"]
